<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>De-Hype Options</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 24px;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        max-width: 700px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 16px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #020617;
        color: #e2e8f0;
      }
      button {
        margin-top: 10px;
        padding: 10px 16px;
        background: #0ea5e9;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      .subtle {
        color: #94a3b8;
        margin-top: 12px;
      }
      #status {
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>De-Hype Options</h1>
      <p class="subtle">Store your OpenAI API key securely in this extension's local storage.</p>
      <label for="api-key">OpenAI API key</label><br />
      <input id="api-key" type="password" placeholder="sk-..." autocomplete="off" />
      <div>
        <button id="save">Save key</button>
      </div>
      <div id="status" class="subtle">No key saved yet.</div>
      <p class="subtle">The extension will call <strong>gpt-4o-mini</strong> from the service worker.</p>
    </div>
    <script src="options.js"></script>
  </body>
</html>
